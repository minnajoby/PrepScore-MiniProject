{% load static %}

<!-- 1. BRAND HEADER -->
<div class="sidebar-header text-center py-4">
    <a href="{% url 'dashboard' %}" class="text-white text-decoration-none">
        <h2 class="h4 fw-bold mb-0">
            PrepScore
        </h2>
    </a>
</div>

<!-- 2. MAIN NAVIGATION (Takes up all available space) -->
<ul class="nav flex-column nav-pills nav-flush flex-grow-1 px-2">
    <li class="nav-item">
        <a class="nav-link {% if request.path == '/dashboard/' %}active{% endif %}" href="{% url 'dashboard' %}">
            <i class="bi bi-grid-fill me-2"></i>Dashboard
        </a>
    </li>
    <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'manage_profile' %}active{% endif %}"
            href="{% url 'manage_profile' %}">
            <i class="bi bi-person-badge me-2"></i>Core Profile
        </a>
    </li>
    <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'manage_skills' %}active{% endif %}"
            href="{% url 'manage_skills' %}">
            <i class="bi bi-tools me-2"></i>Skills
        </a>
    </li>
    <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'manage_experience' %}active{% endif %}"
            href="{% url 'manage_experience' %}">
            <i class="bi bi-briefcase me-2"></i>Experience
        </a>
    </li>
    <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'manage_education' %}active{% endif %}"
            href="{% url 'manage_education' %}">
            <i class="bi bi-book me-2"></i>Education
        </a>
    </li>
    <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'manage_certifications' %}active{% endif %}"
            href="{% url 'manage_certifications' %}">
            <i class="bi bi-award me-2"></i>Certifications
        </a>
    </li>
    <li class="nav-item">
        <a class="nav-link {% if 'gap-analysis' in request.path %}active{% endif %}" href="{% url 'gap_analysis' %}">
            <i class="bi bi-robot me-2"></i>AI Gap Analysis
        </a>
    </li>
</ul>

<!-- 3. LOGOUT (Anchored at the bottom) -->
<div class="logout-section px-2 pb-3">
    <form action="{% url 'logout' %}" method="post">
        {% csrf_token %}
        <button type="submit" class="nav-link w-100">
            <i class="bi bi-box-arrow-right me-2"></i>Logout
        </button>
    </form>
</div>
